name: "cfm"

model:
  track_history: False
  input_vars: &INPUT_VARS
    z_vars: ["x_hat", "y_hat", "z_hat", "e"]
    c_vars: ["dir_x", "dir_y", "dir_z", "e_inc"]
  transforms: &TRANSFORMS 
    e: "log"
    z_hat: "sqrt"
  num_steps: 40
  aux_model:
    name: mdnV1
    model_dir: logs/final/mdn/version_2
  encoder: null
  mlp:
    hidden_layers: [128, 128]
    activation: "relu"
    layer_norm: False

trainer:
  epochs: 5
  patience: 1

optimizer: 
  type: adam
  lr: 0.00001

logger:
  log_dir: "logs/sweep/cfm"

data_loader:
  load_dir: "data/test5"
  num_files: 1
  standardize_vars: ["e_log_norm", "e_sqrt_norm", "e_inc_norm"]
  transforms: *TRANSFORMS
  input_vars: *INPUT_VARS
  sort_by_time: True
  batch_size: 128
  is_ragged: True
  data_view: "event"
  batch_mode: 
    name: "sparse"
