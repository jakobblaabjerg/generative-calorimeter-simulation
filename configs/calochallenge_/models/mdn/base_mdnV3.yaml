name: "mdnV3"

model:
  feature_dim: 6480
  add_jacobian: True
  k: 6
  transforms: &TRANSFORMS 
    e: "sqrt"
  input_vars: &INPUT_VARS
    x_vars: ["e"]
    c_vars: ["e_inc_norm"]
  mlp:
    hidden_layers: [128, 128, 128]
    layer_norm: True
    activation: sigmoid
    output_size: 128
  mdn_head: 
    hidden_layers: [64, 64]
    layer_norm: True
  
trainer:
  epochs: 50
  patience: 5

optimizer: 
  type: adam
  lr: 0.000019248016321617105

logger:
  log_dir: "logs/mdn"

data_loader:
  load_dir: "data/test6"
  batch_size: 256
  num_files: 1
  standardize_vars: ["e_log_norm", "e_sqrt_norm", "e_inc_norm"]
  transforms: *TRANSFORMS
  input_vars: *INPUT_VARS
  data_view: "event"
  is_ragged: False


