model:  
  input_dim: 4 
  add_jacobian: True
  spherical: &SPHERICAL False
  k: 3
  hidden_layers: [128, 128]
  layer_norm: False
  activation: relu
  transforms: &TRANSFORMS 
    e: "log"
    z_hat: "sqrt"

  
trainer:
  epochs: 3
  patience: null

optimizer: 
  type: adam
  lr: 0.00001

logger:
  log_dir: "logs/run2"

data_loader:
  load_dir: &LOAD_DIR "data/test5"
  spherical: *SPHERICAL
  batch_size: 128
  num_files: 1
  standardize_vars: &STANDARDIZE_VARS ["e_log_norm", "e_sqrt_norm", "e_inc_norm"]
  transforms: *TRANSFORMS

sampler:
  num_files: 2
  device: cuda
  data_loader:
    phi: null
    theta: null
    e_inc: null
    n_samples: 3
    batch_size: 1000
    load_dir: *LOAD_DIR
    standardize_vars: *STANDARDIZE_VARS